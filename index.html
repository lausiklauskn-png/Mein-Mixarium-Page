<style>
:root{--bg:#070a12;--card:#0e1322;--txt:#eaf2ff;--sub:#93a7c8;--cy:#7cd4ff;--vi:#9a7bff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
 min-height:100vh;display:flex;flex-direction:column;align-items:center;
 background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(110,80,220,.16),transparent),
 radial-gradient(ellipse 60% 40% at 50% 110%,rgba(60,180,255,.10),transparent)}
.wrap{width:100%;max-width:560px;padding:34px 18px 50px;text-align:center}
.icon{width:132px;height:132px;border-radius:30px;display:block;margin:0 auto 18px;
 box-shadow:0 0 44px rgba(124,212,255,.35),0 14px 40px rgba(0,0,0,.55)}
h1{font-size:2rem;letter-spacing:.4px;margin-bottom:6px}
.sub{color:var(--sub);font-size:1.02rem;margin-bottom:28px}
.vbox{background:var(--card);border:1px solid rgba(124,212,255,.22);border-radius:18px;
 padding:14px;box-shadow:0 18px 50px rgba(0,0,0,.5);margin-bottom:16px}
video{width:100%;border-radius:12px;display:block;background:#000}
.vlabel{color:var(--sub);font-size:.85rem;margin:10px 2px 2px;text-align:left}
.btn{display:inline-block;margin-top:22px;padding:15px 34px;border-radius:14px;font-weight:700;
 font-size:1.05rem;color:#08101d;text-decoration:none;
 background:linear-gradient(135deg,var(--cy),var(--vi));
 box-shadow:0 10px 30px rgba(124,212,255,.35)}
.btn:active{transform:scale(.97)}
.small{margin-top:34px;font-size:.8rem;color:#5b6b8c}
.small a{color:#7d92b8}
</style>
</head>
